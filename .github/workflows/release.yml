name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare zip structure
        run: |
          mkdir -p dist/obsidian-simple-progress-clocks
          cp main.js manifest.json styles.css dist/obsidian-simple-progress-clocks/

      - name: Create install zip
        run: |
          cd dist
          zip -r obsidian-simple-progress-clocks.zip obsidian-simple-progress-clocks

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/obsidian-simple-progress-clocks.zip
            main.js
            manifest.json
            styles.css